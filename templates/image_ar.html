<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* GLOBAL */

html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
height:100%;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
}

/* CLICK LAYER */

#arLayer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:5;
}

/* UI MESSAGE */

.arUI{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,.6);
color:white;
padding:10px 20px;
border-radius:30px;
font-size:14px;
z-index:2000;
backdrop-filter:blur(10px);
}

/* BACK BUTTON */

.back{
position:fixed;
top:20px;
left:20px;
background:rgba(0,0,0,.6);
padding:10px 18px;
border-radius:30px;
color:white;
text-decoration:none;
z-index:2000;
}

/* AR OBJECT */

.arObject{
position:fixed;
width:260px;
border-radius:20px;
z-index:10;
transform:translate(-50%,-50%);
transition:transform .1s;
cursor:grab;
touch-action:none;
}

.arObject img{
width:100%;
border-radius:20px;
pointer-events:none;
}

/* FLOOR SHADOW */

.shadow{
position:absolute;
bottom:-18px;
left:50%;
width:75%;
height:22px;
background:radial-gradient(
ellipse at center,
rgba(0,0,0,.5),
transparent
);
transform:translateX(-50%);
filter:blur(7px);
}

/* CAPTURE BUTTON */

.captureBtn{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#0072ff;
border:none;
padding:16px 60px;
border-radius:50px;
color:white;
font-size:18px;
z-index:2000;
cursor:pointer;
}

.captureBtn:hover{
background:#005be0;
}

</style>
</head>

<body>

<a href="/" class="back">← Back</a>

<!-- CAMERA -->
<video id="cam" autoplay playsinline muted></video>

<!-- CLICK AREA -->
<div id="arLayer"></div>

<div class="arUI">
Tap anywhere to place • Drag to move • Scroll / Pinch to zoom
</div>

<!-- AR OBJECT -->

<div class="arObject" id="object">

<img src="{{ project.file_url }}" crossorigin="anonymous">

<div class="shadow"></div>

</div>

<!-- CAPTURE BUTTON -->

<button class="captureBtn" id="captureBtn">
📸 Capture
</button>

<script>

/* CAMERA */

const cam=document.getElementById("cam")

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
cam.srcObject=stream
})
.catch(()=>{
alert("Camera requires HTTPS or localhost")
})

/* AR VARIABLES */

let object=document.getElementById("object")

let x=window.innerWidth/2
let y=window.innerHeight/2
let scale=1

/* UPDATE POSITION */

function update(){

object.style.transform=
`translate(${x}px,${y}px) translate(-50%,-50%) scale(${scale}) rotateX(10deg)`

}

/* TAP TO PLACE OBJECT */

document.getElementById("arLayer").addEventListener("click",e=>{

x=e.clientX
y=e.clientY

update()

})

/* DRAG OBJECT */

let startX,startY

object.addEventListener("mousedown",e=>{

startX=e.clientX-x
startY=e.clientY-y

function move(e){

x=e.clientX-startX
y=e.clientY-startY

update()

}

function stop(){

document.removeEventListener("mousemove",move)
document.removeEventListener("mouseup",stop)

}

document.addEventListener("mousemove",move)
document.addEventListener("mouseup",stop)

})

/* TOUCH DRAG */

object.addEventListener("touchstart",e=>{

let t=e.touches[0]

startX=t.clientX-x
startY=t.clientY-y

})

object.addEventListener("touchmove",e=>{

if(e.touches.length===1){

let t=e.touches[0]

x=t.clientX-startX
y=t.clientY-startY

update()

}

})

/* MOUSE WHEEL ZOOM */

object.addEventListener("wheel",e=>{

e.preventDefault()

scale+=e.deltaY*-0.001

scale=Math.max(.3,Math.min(scale,3))

update()

})

/* PINCH ZOOM */

let initialDistance=null
let initialScale=1

object.addEventListener("touchstart",e=>{

if(e.touches.length===2){

initialDistance=Math.hypot(
e.touches[0].clientX-e.touches[1].clientX,
e.touches[0].clientY-e.touches[1].clientY
)

initialScale=scale

}

})

object.addEventListener("touchmove",e=>{

if(e.touches.length===2){

e.preventDefault()

let newDistance=Math.hypot(
e.touches[0].clientX-e.touches[1].clientX,
e.touches[0].clientY-e.touches[1].clientY
)

scale=initialScale*(newDistance/initialDistance)

scale=Math.max(.3,Math.min(scale,3))

update()

}

})

/* CAPTURE SCREENSHOT */

document.getElementById("captureBtn").addEventListener("click",async()=>{

const canvas=document.createElement("canvas")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const ctx=canvas.getContext("2d")

/* draw camera */

ctx.drawImage(cam,0,0,canvas.width,canvas.height)

/* capture AR object */

const arCanvas=await html2canvas(object,{
backgroundColor:null,
useCORS:true
})

const rect=object.getBoundingClientRect()

ctx.drawImage(
arCanvas,
rect.left,
rect.top,
rect.width,
rect.height
)

/* download */

const link=document.createElement("a")

link.download="AR_capture.png"

link.href=canvas.toDataURL()

link.click()

})

update()

</script>

</body>
</html>
