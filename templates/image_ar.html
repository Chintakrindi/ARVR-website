<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AR Image Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* ================= GLOBAL ================= */
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
height:100%;
perspective:1400px;
}

/* ================= CAMERA ================= */
video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:1;
filter:brightness(.92) contrast(1.05) saturate(1.1);
}

/* ================= AR IMAGE ================= */
.arImage{
position:fixed;
top:50%;
left:50%;
width:320px;
border-radius:28px;
cursor:grab;
z-index:5;
transform-style:preserve-3d;

box-shadow:
0 80px 220px rgba(0,0,0,.95),
0 30px 100px rgba(0,0,0,.8);

transition:transform .08s ease-out;
}

.arImage img{
width:100%;
border-radius:28px;
}

/* ================= DEPTH CONTROL ================= */
.depthControl{
position:fixed;
top:25px;
left:50%;
transform:translateX(-50%);
padding:12px 28px;
border-radius:50px;
background:rgba(20,20,30,.6);
backdrop-filter:blur(20px);
color:white;
z-index:1000;
box-shadow:0 8px 40px rgba(0,0,0,.6);
}

.depthControl input{
width:200px;
appearance:none;
height:6px;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
outline:none;
}

.depthControl input::-webkit-slider-thumb{
appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:white;
box-shadow:0 0 15px rgba(0,200,255,.8);
}

/* ================= CAPTURE BUTTON ================= */
.captureBtn{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:linear-gradient(135deg,#00c6ff,#0072ff);
border:none;
padding:16px 55px;
border-radius:60px;
font-size:17px;
color:white;
font-weight:600;
z-index:2000;   /* VERY IMPORTANT */

box-shadow:
0 15px 70px rgba(0,150,255,.8),
0 0 30px rgba(0,200,255,.5);

transition:.25s;
}

.captureBtn:active{
transform:translateX(-50%) scale(.95);
}

</style>
</head>

<body>

<!-- CAMERA -->
<video id="cam" autoplay playsinline muted></video>

<!-- AR IMAGE -->
<div class="arImage" id="plate">
<img src="{{ project.file_url }}">
</div>

<!-- DEPTH CONTROL -->
<div class="depthControl">
Depth
<input type="range" min="-300" max="300" value="0" id="depth">
</div>

<!-- CAPTURE BUTTON -->
<button class="captureBtn" id="captureBtn">
📸 Capture
</button>

<script>

/* CAMERA START */
const cam=document.getElementById("cam");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
}).then(stream=>{
cam.srcObject=stream;
}).catch(()=>{
alert("Camera requires HTTPS.");
});

/* AR TRANSFORM VARIABLES */
let plate=document.getElementById("plate");

let x=0;
let y=0;
let scale=1;
let depth=0;

/* UPDATE FUNCTION */
function update(){
plate.style.transform=
`translate(-50%,-50%)
 translate(${x}px,${y}px)
 translateZ(${depth}px)
 scale(${scale})`;
}

/* DRAG */
plate.addEventListener("mousedown",e=>{
let sx=e.clientX-x;
let sy=e.clientY-y;

function move(e){
x=e.clientX-sx;
y=e.clientY-sy;
update();
}

function stop(){
document.removeEventListener("mousemove",move);
document.removeEventListener("mouseup",stop);
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",stop);
});

/* ZOOM */
plate.addEventListener("wheel",e=>{
e.preventDefault();
scale+=e.deltaY*-0.001;
scale=Math.max(.3,Math.min(scale,3));
update();
});

/* DEPTH */
document.getElementById("depth").addEventListener("input",e=>{
depth=e.target.value;
update();
});

/* CAPTURE */
document.getElementById("captureBtn").addEventListener("click",()=>{
html2canvas(document.body).then(canvas=>{
let link=document.createElement("a");
link.download="AR_Image.png";
link.href=canvas.toDataURL();
link.click();
});
});

update();

</script>

</body>
</html>
