<!DOCTYPE html>
<html>
<head>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>AR Viewer</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Segoe UI;
}

/* CAMERA */

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* AR IMAGE PANEL */

.arImage{
position:fixed;
top:50%;
left:50%;
width:320px;
border-radius:22px;
cursor:grab;
touch-action:none;
box-shadow:0 60px 200px rgba(0,0,0,.9);
}

.arImage img{
width:100%;
border-radius:22px;
}

/* CAPTURE BUTTON */

.captureBtn{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
padding:14px 40px;
border-radius:40px;
background:#00bcd4;
color:white;
border:none;
font-weight:bold;
cursor:pointer;
z-index:9999;
}

/* POPUP PREVIEW */

#previewPopup{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,.85);
align-items:center;
justify-content:center;
flex-direction:column;
z-index:99999;
}

#previewPopup img{
max-width:90%;
max-height:80%;
border-radius:12px;
}

#closePreview{
position:absolute;
top:20px;
right:30px;
color:white;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<video id="cam" autoplay playsinline muted></video>

<div class="arImage" id="plate">
<img src="{{ project.file_url }}">
</div>

<button id="captureBtn" class="captureBtn">
📸 Capture
</button>

<div id="previewPopup">

<span id="closePreview">✕</span>

<img id="previewImage">

</div>


<script>

/* CAMERA START */

const cam=document.getElementById("cam");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
}).then(stream=>{
cam.srcObject=stream;
});


/* TRANSFORM VARIABLES */

let plate=document.getElementById("plate");

let x=0,y=0,scale=1,rotation=0;

let startX,startY,startDist,startAngle;


/* UPDATE POSITION */

function update(){

plate.style.transform=`
translate(calc(-50% + ${x}px),
calc(-50% + ${y}px))
scale(${scale})
rotate(${rotation}deg)
`;

}


/* DRAG */

plate.onmousedown=e=>{

startX=e.clientX-x;
startY=e.clientY-y;

document.onmousemove=e=>{

x=e.clientX-startX;
y=e.clientY-startY;

update();

};

document.onmouseup=()=>document.onmousemove=null;

};


/* ZOOM */

plate.onwheel=e=>{

e.preventDefault();

scale+=e.deltaY*-0.001;

scale=Math.max(.3,Math.min(scale,4));

update();

};


/* TOUCH START */

plate.addEventListener("touchstart",e=>{

if(e.touches.length==1){

startX=e.touches[0].clientX-x;
startY=e.touches[0].clientY-y;

}

if(e.touches.length==2){

startDist=getDistance(e);
startAngle=getAngle(e);

}

});


/* TOUCH MOVE */

plate.addEventListener("touchmove",e=>{

e.preventDefault();

if(e.touches.length==1){

x=e.touches[0].clientX-startX;
y=e.touches[0].clientY-startY;

}

if(e.touches.length==2){

let newDist=getDistance(e);

scale*=newDist/startDist;

startDist=newDist;

let newAngle=getAngle(e);

rotation+=newAngle-startAngle;

startAngle=newAngle;

}

update();

});


function getDistance(e){

let dx=e.touches[0].clientX-e.touches[1].clientX;
let dy=e.touches[0].clientY-e.touches[1].clientY;

return Math.sqrt(dx*dx+dy*dy);

}


function getAngle(e){

let dx=e.touches[1].clientX-e.touches[0].clientX;
let dy=e.touches[1].clientY-e.touches[0].clientY;

return Math.atan2(dy,dx)*180/Math.PI;

}


/* CAPTURE */

document.getElementById("captureBtn").onclick=function(){

let btn=document.getElementById("captureBtn");

btn.style.display="none";

html2canvas(document.body,{
useCORS:true,
allowTaint:true,
scale:2
}).then(canvas=>{

btn.style.display="block";

let imageURL=canvas.toDataURL("image/png");

/* SHOW POPUP */

document.getElementById("previewImage").src=imageURL;

document.getElementById("previewPopup").style.display="flex";

/* DOWNLOAD IMAGE */

let link=document.createElement("a");

link.download="AR_capture.png";

link.href=imageURL;

link.click();

});

};


document.getElementById("closePreview").onclick=function(){

document.getElementById("previewPopup").style.display="none";

};

</script>

</body>
</html>
